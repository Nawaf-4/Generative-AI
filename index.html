<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المهام الاحترافية - A3</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center justify-center p-4 font-sans">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-100">
        <h2 class="text-2xl font-black mb-6 text-center text-indigo-600 tracking-tight">نظام المهام الاحترافي (A3)</h2>
        
        <div id="auth-section" class="space-y-4">
            <div class="bg-indigo-50 p-3 rounded-lg text-xs text-indigo-800 text-center font-medium">
                مطلوب تسجيل الدخول لتجربة بيئة العمل الاحترافية المخصصة لكل مستخدم.
            </div>
            <input type="email" id="email" placeholder="البريد الإلكتروني" class="w-full p-3 border border-slate-200 rounded-xl focus:outline-none">
            <input type="password" id="password" placeholder="كلمة المرور" class="w-full p-3 border border-slate-200 rounded-xl focus:outline-none">
            <div class="flex gap-2 pt-2">
                <button onclick="login()" class="w-1/2 bg-indigo-600 text-white p-3 rounded-xl font-bold hover:bg-indigo-700 transition">دخول</button>
                <button onclick="signup()" class="w-1/2 bg-slate-100 text-slate-700 p-3 rounded-xl font-bold hover:bg-slate-200 transition">تسجيل جديد</button>
            </div>
        </div>

        <div id="app-section" class="hidden space-y-4">
            <div class="flex justify-between items-center border-b border-slate-100 pb-3">
                <span id="user-display" class="text-xs font-semibold text-slate-500 bg-slate-100 px-3 py-1 rounded-full"></span>
                <button onclick="logout()" class="text-red-500 text-xs font-bold hover:underline">تسجيل خروج</button>
            </div>

            <div class="flex gap-2">
                <input type="text" id="task-input" placeholder="اكتب مهمة جديدة هنا..." class="flex-1 p-3 border border-slate-200 rounded-xl">
                <button onclick="addTask()" class="bg-indigo-600 text-white px-5 py-3 rounded-xl font-bold">+</button>
            </div>

            <ul id="tasks-list" class="space-y-2.5 max-h-64 overflow-y-auto pr-1"></ul>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://hzyuvrsbljudvcvntqqb.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_kRchQEBcrFnFh8ciYKskuA_BdOESOPH";
        
        // إعداد الاتصال مع تفعيل حفظ الجلسة محلياً ليتعرف المتصفح على الدخول فوراً
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
            auth: {
                persistSession: true,
                autoRefreshToken: true
            }
        });

        const authSection = document.getElementById('auth-section');
        const appSection = document.getElementById('app-section');
        const userDisplay = document.getElementById('user-display');
        const tasksList = document.getElementById('tasks-list');

        supabase.auth.onAuthStateChange((event, session) => {
            if (session) {
                authSection.classList.add('hidden');
                appSection.classList.remove('hidden');
                userDisplay.innerText = session.user.email;
                loadTasks();
            } else {
                authSection.classList.remove('hidden');
                appSection.classList.add('hidden');
            }
        });

        async function signup() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if(!email || !password) return alert('الرجاء تعبئة الحقول');
            const { data, error } = await supabase.auth.signUp({ email, password });
            if (error) alert(error.message);
            else alert('تم التسجيل بنجاح! اضغط الآن على دخول.');
        }

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if(!email || !password) return alert('الرجاء تعبئة الحقول');
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) {
                alert("خطأ في الدخول: " + error.message);
            } else {
                // تحديث الواجهة يدوياً فوراً عند نجاح العملية
                authSection.classList.add('hidden');
                appSection.classList.remove('hidden');
                userDisplay.innerText = data.user.email;
                loadTasks();
            }
        }

        async function logout() {
            await supabase.auth.signOut();
            window.location.reload();
        }

        async function loadTasks() {
            tasksList.innerHTML = '';
            const user = (await supabase.auth.getUser()).data.user;
            if(!user) return;
            
            let { data: tasks, error } = await supabase
                .from('tasks')
                .select('*')
                .order('created_at', { ascending: false });

            if (!error && tasks) {
                tasks.forEach(task => {
                    const li = document.createElement('li');
                    li.className = "flex justify-between items-center bg-slate-50 p-3 rounded-xl border border-slate-100";
                    li.innerHTML = `
                        <span class="text-sm font-medium ${task.is_completed ? 'line-through text-slate-400' : 'text-slate-700'}">${task.title}</span>
                        <div class="flex gap-2">
                            <button onclick="toggleTask('${task.id}', ${task.is_completed})" class="text-indigo-600 font-bold">✓</button>
                            <button onclick="deleteTask('${task.id}')" class="text-red-500 font-bold">✕</button>
                        </div>
                    `;
                    tasksList.appendChild(li);
                });
            }
        }

        async function addTask() {
            const input = document.getElementById('task-input');
            const title = input.value.trim();
            if (!title) return;

            const user = (await supabase.auth.getUser()).data.user;
            const { error } = await supabase.from('tasks').insert([{ title, user_id: user.id }]);
            
            if (!error) {
                input.value = '';
                loadTasks();
            } else {
                alert('خطأ أثناء الإضافة: ' + error.message);
            }
        }

        async function toggleTask(id, currentStatus) {
            await supabase.from('tasks').update({ is_completed: !currentStatus }).eq('id', id);
            loadTasks();
        }

        async function deleteTask(id) {
            if(!confirm('هل أنت متأكد؟')) return;
            await supabase.from('tasks').delete().eq('id', id);
            loadTasks();
        }
    </script>
</body>
</html>
